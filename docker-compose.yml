version: '3.8'
services:
  quicksend:
    image: quicksend:v1.0.11   # 改成 docker load 输出的那个
    container_name: quicksend
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      - HEADLESS=1
      - PORT=8000
      - QUICKSEND_NO_BROWSER=1
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/QuickSend
    restart: unless-stopped
